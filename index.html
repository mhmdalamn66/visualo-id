<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualo Group | Motion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #ffffff;
            --text: #000000;
            --surface: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03;
            pointer-events: none;
            z-index: 999;
        }

        .grid-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: -1;
        }

        #gate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.1, 1);
        }

        .is-active #gate {
            transform: translateY(-100%);
        }

        .hero-text {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 800;
            line-height: 0.8;
            letter-spacing: -0.07em;
            text-align: center;
            margin-bottom: 3.5rem;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-outline {
            color: transparent;
            -webkit-text-stroke: 1px #000;
            margin: -0.05em 0;
        }

        .cta-button {
            padding: 24px 60px;
            background: #111;
            color: #fff;
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }

        #content {
            height: 100vh;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            padding: 120px 20px 80px;
        }

        .is-active #content { opacity: 1; }

        .biz-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid #efefef;
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 24px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .ig-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: #f8f8f8;
            border-radius: 100px;
            text-decoration: none;
            color: #71717a;
            transition: 0.3s;
        }

        .ig-link:hover { background: #000; color: #fff; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="grid-canvas"></div>

    <section id="gate">
        <div class="mono text-[10px] tracking-[0.4em] uppercase mb-8 text-zinc-400">Visualo Group</div>
        <h1 class="hero-text">
            <span>WE ARE</span>
            <span class="hero-outline">ON</span>
            <span>SOMETHING</span>
        </h1>
        <button class="cta-button" onclick="activate()">Reveal</button>
    </section>

    <main id="content">
        <div class="max-w-screen-sm mx-auto">
            <div class="biz-card">
                <h2 class="text-4xl font-extrabold tracking-tighter mb-4">Studio<span class="text-orange-600">.</span></h2>
                <p class="text-zinc-500 text-sm leading-relaxed mb-8">Penceritaan sinematik dan strategi kreatif fidelitas tinggi.</p>
                <div class="flex justify-end border-t border-zinc-100 pt-6">
                    <a href="https://instagram.com/visualostudio" target="_blank" class="ig-link">
                        <span class="mono text-[9px] font-bold uppercase">Instagram</span>
                    </a>
                </div>
            </div>

            <div class="biz-card">
                <h2 class="text-4xl font-extrabold tracking-tighter mb-4">Systems<span class="text-orange-600">.</span></h2>
                <p class="text-zinc-500 text-sm leading-relaxed mb-8">Infrastruktur digital untuk operasional bisnis yang cerdas.</p>
                <div class="flex justify-end border-t border-zinc-100 pt-6">
                    <a href="https://instagram.com/visualosystems" target="_blank" class="ig-link">
                        <span class="mono text-[9px] font-bold uppercase">Instagram</span>
                    </a>
                </div>
            </div>

            <div class="biz-card">
                <h2 class="text-4xl font-extrabold tracking-tighter mb-4">Living<span class="text-orange-600">.</span></h2>
                <p class="text-zinc-500 text-sm leading-relaxed mb-8">Solusi hunian minimalis untuk masa depan urban.</p>
                <div class="flex justify-end border-t border-zinc-100 pt-6">
                    <a href="https://instagram.com/visualoliving" target="_blank" class="ig-link">
                        <span class="mono text-[9px] font-bold uppercase">Instagram</span>
                    </a>
                </div>
            </div>

            <footer class="mt-32 pb-12 text-center">
                <div class="mono text-[10px] text-zinc-400 mb-8 tracking-[0.4em]">ALL RIGHTS RESERVED 2024</div>
                <button onclick="deactivate()" class="text-xs font-bold px-8 py-3 border border-zinc-200 rounded-full hover:bg-black hover:text-white transition-all uppercase tracking-tighter">Terminate Session</button>
            </footer>
        </div>
    </main>

    <script>
        function activate() { document.body.classList.add('is-active'); }
        function deactivate() {
            document.getElementById('content').scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { document.body.classList.remove('is-active'); }, 500);
        }
    </script>
</body>
</html>
